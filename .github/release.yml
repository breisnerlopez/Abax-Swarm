changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Bug Fixes
      labels:
        - bugfix
        - bug
        - hotfix
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Chores and Refactor
      labels:
        - chore
        - refactor
        - dependencies
    - title: Other Changes
      labels:
        - "*"
