  - wireframe-design
  - accessibility-check
  - navigation-flow
  - component-design
  - presentation-design

tools:
  - generate-diagram
  - create-document
  - create-presentation

dependencies:
  receives_from:
    - business-analyst
    - product-owner
  delivers_to:
    - developer-frontend
    - project-manager
    - change-manager

phases:
  - discovery
  - functional-analysis
  - technical-design

