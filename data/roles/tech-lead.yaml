  - construction
  - qa-testing
  - stabilization

raci:
  define_scope: C
  gather_requirements: I
  design_solution: R
  build_solution: A/R
  design_tests: C
  execute_qa: C
  approve_deployment: C
  post_production_support: R
  close_project: I
