# Secret detection patterns.
# Generic baseline. Hooks that consume this:
#   - PreToolUse on `Task`:  scans the delegation prompt
#   - PreToolUse on `write`: scans the file content being written
#   - PostToolUse on `bash`: scans stdout/stderr
#
# severity:
#   block — the operation is refused and the secret is masked in feedback
#   warn  — the operation proceeds; a notice is emitted to the orchestrator
#
# Per-project additions go in project-manifest.yaml under
# `secret_patterns_extra:` and merge by `id` (additive — defaults are kept).

patterns:
  # --- High-confidence credentials: blocked from day one --------------------
  - id: openai-api-key
    regex: 'sk-(proj-|live-)?[A-Za-z0-9_-]{30,}'
    severity: block
    description: OpenAI API key

  - id: anthropic-api-key
    regex: 'sk-ant-(api03-|admin01-)?[A-Za-z0-9_-]{40,}'
    severity: block
    description: Anthropic API key

  - id: aws-access-key
    regex: 'AKIA[0-9A-Z]{16}'
    severity: block
    description: AWS Access Key ID

  - id: github-pat
    regex: 'gh[pousr]_[A-Za-z0-9]{36,}'
    severity: block
    description: GitHub Personal Access Token

  - id: gcp-service-account
    regex: '"private_key_id"\s*:\s*"[a-f0-9]{40}"'
    severity: block
    description: GCP service account JSON private_key_id

  # --- Lower-confidence patterns: warn until tuned per project --------------
  - id: jwt-token
    regex: 'eyJ[A-Za-z0-9_-]{20,}\.eyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}'
    severity: warn
    description: JWT (could be legitimate in auth docs)

  - id: generic-bearer
    regex: 'Bearer [A-Za-z0-9_\-\.=]{40,}'
    severity: warn
    description: Authorization Bearer header

  - id: high-entropy-base64
    regex: '[A-Za-z0-9+/]{60,}={0,2}'
    severity: warn
    description: long base64 string (probably a secret or hash)

  - id: ssh-private-key-header
    regex: '-----BEGIN (RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY-----'
    severity: block
    description: SSH/PGP private key header
