phases:
  # ---- Phase 0: Discovery (narrative_only) -----------------------------
  # The orchestrator template (orchestrator.md.hbs) carries the rich
  # narrative for this phase — 8 numbered steps that walk through how
  # to elicit vision, epicas, historias, backlog, design-system and the
  # discovery presentation. We declare the phase HERE solely so the
  # runtime plugin can recognise "discovery" as a phase id for
  # iteration-scope enforcement (skip_phases, minimal_phases,
  # require_scope_for_phases). `narrative_only: true` instructs the
  # generator NOT to emit a duplicate "### Fase N: Descubrimiento"
  # block in the rendered orchestrator.md — the loop that renders
  # phaseGates skips phases marked narrative_only.
  - id: discovery
    name: Descubrimiento y Definicion de Alcance
    gate_approver: product-owner
    narrative_only: true
    deliverables:
      - id: vision-producto
        name: Vision del Producto
        responsible: business-analyst
        approver: product-owner
        mandatory: true
        artifact_type: document
      - id: epicas-features
        name: Mapa de Epicas y Features
        responsible: business-analyst
        approver: product-owner
        mandatory: true
        artifact_type: document
      - id: historias-usuario
        name: Historias de Usuario con Criterios de Aceptacion
        responsible: business-analyst
        approver: product-owner
        mandatory: true
        artifact_type: document
      - id: design-system-template
        name: Design System de Presentaciones (HTML template)
        # First-iteration deliverable. In subsequent iterations the
        # template already exists and this deliverable is skipped via
        # iteration-scopes. Falls back to ux-designer when present in
        # the team; otherwise BA produces the initial template.
        responsible: business-analyst
        approver: product-owner
        mandatory: true
        artifact_type: document
      - id: backlog-priorizado
        name: Product Backlog Priorizado (MVP identificado)
        responsible: business-analyst
        approver: product-owner
        mandatory: true
        artifact_type: document
      - id: discovery-presentation
        name: Presentacion de Descubrimiento (HTML)
        responsible: project-manager
        approver: product-owner
        mandatory: true
        artifact_type: presentation

  - id: inception
    name: Inicio
    gate_approver: product-owner
    deliverables:
      - id: project-charter
        name: Acta de Constitucion del Proyecto
        responsible: project-manager
        approver: product-owner
        mandatory: true
        artifact_type: document
      - id: kickoff-presentation
        name: Presentacion de Kickoff
        responsible: project-manager
        approver: product-owner
        mandatory: true
        artifact_type: presentation
      - id: stakeholder-register
        name: Registro de Interesados
        responsible: project-manager
        approver: product-owner
        mandatory: true
        artifact_type: document
      - id: initial-risk-matrix
        name: Matriz de Riesgos Inicial
        responsible: project-manager
        approver: product-owner
        mandatory: true
        artifact_type: document
      - id: project-schedule
        name: Cronograma Preliminar
        responsible: project-manager
        approver: product-owner
        mandatory: true
        artifact_type: diagram

  - id: functional-analysis
    name: Analisis Funcional
    gate_approver: product-owner
    deliverables:
      - id: functional-spec
        name: Especificacion Funcional
        responsible: business-analyst
        approver: product-owner
        mandatory: true
        artifact_type: document
      - id: business-rules-doc
        name: Documento de Reglas de Negocio
        responsible: business-analyst
        approver: product-owner
        mandatory: true
        artifact_type: document
      - id: process-diagrams
        name: Diagramas de Proceso
        responsible: business-analyst
        approver: product-owner
        mandatory: true
        artifact_type: diagram
      - id: acceptance-criteria-doc
        name: Criterios de Aceptacion
        responsible: business-analyst
        approver: product-owner
        mandatory: true
        artifact_type: document
      - id: functional-presentation
        name: Presentacion de Propuesta Funcional
        responsible: business-analyst
        approver: product-owner
        mandatory: true
        artifact_type: presentation
      - id: change-impact-report
        name: Analisis de Impacto del Cambio
        responsible: change-manager
        approver: project-manager
        mandatory: false
        artifact_type: document

  - id: technical-design
    name: Diseno Tecnico
    gate_approver: solution-architect
    deliverables:
      - id: architecture-doc
        name: Documento de Arquitectura
        responsible: solution-architect
        approver: tech-lead
        mandatory: true
        artifact_type: document
        responsible_fallback: [tech-lead]
      - id: architecture-presentation
        name: Presentacion de Arquitectura
        responsible: solution-architect
        approver: product-owner
        mandatory: true
        artifact_type: presentation
        responsible_fallback: [tech-lead]
      - id: data-model
        name: Modelo de Datos
        responsible: dba
        approver: solution-architect
        mandatory: true
        artifact_type: diagram
        responsible_fallback: [tech-lead, developer-backend]
        approver_fallback: [tech-lead]
      - id: integration-design-doc
        name: Diseno de Integraciones
        responsible: integration-architect
        approver: solution-architect
        mandatory: false
        artifact_type: document
      - id: security-assessment
        name: Evaluacion de Seguridad
        responsible: security-architect
        approver: solution-architect
        mandatory: false
        artifact_type: document
      - id: test-strategy-doc
        name: Estrategia de Pruebas
        responsible: qa-lead
        approver: project-manager
        mandatory: true
        artifact_type: document
        responsible_fallback: [qa-functional]
      - id: technical-task-breakdown
        name: Descomposicion Tecnica de Tareas
        responsible: tech-lead
        approver: project-manager
        mandatory: true
        artifact_type: document

  - id: construction
    name: Construccion
    gate_approver: tech-lead
    # Verifiable conditions evaluated by the phase-state tool before
    # tech-lead can sign the gate. Empty by default in v0.1.39 and earlier
    # phase definitions; populated as a worked example here in 0.1.40+.
    gates:
      - id: not-on-main
        type: git-check
        check: branch
        not_in: [main, master, trunk]
        on_failure: block
      - id: env-verified
        type: file-exists
        target: "docs/entregables/{phase}/00-verificacion-entorno.md"
        on_failure: block
      - id: smoke-runtime-passed
        type: attestation
        attestor_role: devops
        deliverable: env-verification
        on_failure: block
    deliverables:
      - id: env-verification
        name: Verificacion de entorno y dependencias
        responsible: devops
        approver: tech-lead
        mandatory: true
        artifact_type: document
        attestation_required: true
        responsible_fallback: [tech-lead]
        # BLOCKING: must complete before any other construction deliverable.
        # Verifies runtime, declares dependencies, sets up local execution.
        # Generated path: docs/entregables/fase-4-construccion/00-verificacion-entorno.md
      - id: source-code
        name: Codigo Fuente Implementado
        responsible: developer-backend
        approver: tech-lead
        mandatory: true
        artifact_type: code
        attestation_required: true
        # Worked example of behavioural verification — replaces the
        # "trust the agent's word" model with executable checks.
        # Placeholders are resolved by the verify-deliverable tool against
        # the project's stack:
        #   {stack.backend.test_command}  → e.g. "./mvnw -q test" / "pytest -q" / "go test ./..."
        #   {stack.frontend.test_command} → e.g. "npm test --silent -- --run"
        # Stacks without the field (e.g. legacy-other) cause the verification
        # to be skipped with a notice instead of failing.
        verification:
          - id: backend-tests-pass
            cmd: "{stack.backend.test_command}"
            on_failure: block
          - id: no-mock-in-main
            # Generic — looks for accidentally-shipped mocks in the main
            # source path. Convention covers Java/Kotlin (src/main/), TS/JS
            # (src/), Python (project root). Adjust per stack if needed.
            cmd: "grep -rE 'class (Mock|Fake|Stub|InMemory)[A-Z]' src 2>/dev/null || echo OK"
            expect_regex: "^OK$"
            on_failure: warn
      - id: unit-tests
        name: Pruebas Unitarias
        responsible: developer-backend
        approver: tech-lead
        mandatory: true
        artifact_type: code
      - id: api-documentation
        name: Documentacion de API
        responsible: developer-backend
        approver: tech-lead
        mandatory: false
        artifact_type: document
      - id: project-readme
        name: README del Proyecto
        responsible: tech-writer
        approver: tech-lead
        mandatory: true
        artifact_type: document
        responsible_fallback: [tech-lead]
        # Generated path: README.md (raiz del proyecto cliente)
        # Skill: project-readme. Cubierto por barra documentation-quality-bar.
        # Si no hay tech-writer en el equipo, tech-lead toma el deliverable.
      - id: docs-structure-skeleton
        name: Esqueleto de docs/
        responsible: tech-writer
        approver: tech-lead
        mandatory: true
        artifact_type: document
        responsible_fallback: [tech-lead]
        # Generated path: docs/{architecture,api,runbooks,user-guides,functional,...}/README.md
        # Skill: project-documentation-structure. Solo el esqueleto inicial; los contenidos
        # los llenan los demas entregables a lo largo de la fase.
      - id: sprint-status-presentation
        name: Presentacion de Avance
        responsible: project-manager
        approver: product-owner
        mandatory: true
        artifact_type: presentation
      - id: code-review-report
        name: Reporte de Revision de Codigo
        responsible: tech-lead
        approver: solution-architect
        mandatory: true
        artifact_type: report
      # BLOQUEANTE — ULTIMO entregable de Construccion antes de fase QA.
      # Anadido en 0.1.19 tras incidente Abax-Memory donde un backend con
      # regex disfrazada de IA y un InMemorySearchIndexer en lugar de Qdrant
      # llego al borde del despliegue sin que ningun control lo detectara.
      # Responsable es business-analyst (NO desarrollador, NO tech-lead) —
      # alguien que conoce la spec y NO esta en el equipo de implementacion.
      # Approver es product-owner que consulta al usuario sponsor cuando hay
      # integraciones criticas.
      - id: feature-spec-compliance
        name: Verificacion de cumplimiento Feature vs Especificacion
        responsible: business-analyst
        approver: product-owner
        mandatory: true
        artifact_type: report

  - id: qa-testing
    name: Pruebas QA
    gate_approver: qa-lead
    deliverables:
      - id: test-cases
        name: Casos de Prueba
        responsible: qa-functional
        approver: qa-lead
        mandatory: true
        artifact_type: document
      - id: test-execution-report
        name: Reporte de Ejecucion de Pruebas
        responsible: qa-functional
        approver: qa-lead
        mandatory: true
        artifact_type: report
      - id: defect-report
        name: Reporte de Defectos
        responsible: qa-functional
        approver: qa-lead
        mandatory: true
        artifact_type: report
      - id: qa-results-presentation
        name: Presentacion de Resultados QA
        responsible: qa-lead
        approver: project-manager
        mandatory: true
        artifact_type: presentation
        responsible_fallback: [qa-functional]
      - id: performance-report
        name: Reporte de Pruebas de Rendimiento
        responsible: qa-performance
        approver: qa-lead
        mandatory: false
        artifact_type: report
      - id: regression-report
        name: Reporte de Regresion
        responsible: qa-automation
        approver: qa-lead
        mandatory: true
        responsible_fallback: [qa-functional]
        approver_fallback: [qa-functional]
        artifact_type: report

  - id: uat
    name: Pruebas de Aceptacion
    gate_approver: product-owner
    deliverables:
      - id: uat-plan
        name: Plan de UAT
        responsible: business-analyst
        approver: product-owner
        mandatory: true
        artifact_type: document
      - id: uat-execution-report
        name: Reporte de Ejecucion UAT
        responsible: business-analyst
        approver: product-owner
        mandatory: true
        artifact_type: report
      - id: uat-signoff
        name: Acta de Aceptacion UAT
        responsible: business-analyst
        approver: product-owner
        mandatory: true
        artifact_type: document
      - id: uat-presentation
        name: Presentacion de Resultados UAT
        responsible: business-analyst
        approver: product-owner
        mandatory: true
        artifact_type: presentation

  - id: deployment
    name: Despliegue
    gate_approver: project-manager
    gates:
      - id: deployment-plan-attested
        type: attestation
        attestor_role: devops
        deliverable: deployment-plan-doc
        on_failure: block
      - id: rollback-plan-attested
        type: attestation
        attestor_role: devops
        deliverable: rollback-plan
        on_failure: block
      # Optional but recommended: confirm the public URL is live before
      # closing the phase. The {project_url} placeholder is resolved from
      # the project-manifest.yaml at gate-evaluation time.
      - id: public-url-reachable
        type: url-reachable
        url: "{project_url}"
        expect_status: 200
        timeout_ms: 5000
        on_failure: warn
    deliverables:
      - id: deployment-plan-doc
        name: Plan de Despliegue
        responsible: devops
        responsible_fallback: [tech-lead]
        # Approver es product-owner: representa al sponsor en el flujo. El PO
        # DEBE consultar al usuario sponsor explicitamente antes de aprobar.
        # El orquestador no avanza a otros entregables de fase 7 sin esta
        # aprobacion. Sigue el skill `deployment-planning` (12 preguntas).
        approver: product-owner
        mandatory: true
        artifact_type: document
        attestation_required: true
      - id: rollback-plan
        name: Plan de Rollback
        responsible: devops
        approver: tech-lead
        mandatory: true
        artifact_type: document
        attestation_required: true
        responsible_fallback: [tech-lead]
      - id: go-live-presentation
        name: Presentacion Go-Live Readiness
        responsible: project-manager
        approver: product-owner
        mandatory: true
        artifact_type: presentation
      - id: communication-plan-doc
        name: Plan de Comunicacion
        responsible: change-manager
        approver: project-manager
        mandatory: true
        artifact_type: document
        responsible_fallback: [project-manager]
      - id: training-materials
        name: Materiales de Capacitacion
        responsible: change-manager
        approver: project-manager
        mandatory: false
        artifact_type: document
      - id: runbook
        name: Runbook Operativo
        responsible: tech-writer
        approver: tech-lead
        mandatory: true
        artifact_type: document
        responsible_fallback: [tech-lead]

  - id: stabilization
    name: Estabilizacion
    gate_approver: project-manager
    deliverables:
      - id: incident-report
        name: Reporte de Incidentes Post-Produccion
        responsible: tech-lead
        approver: project-manager
        mandatory: true
        artifact_type: report
      - id: support-status-report
        name: Reporte de Soporte
        responsible: tech-lead
        approver: project-manager
        mandatory: true
        artifact_type: report
      - id: stabilization-presentation
        name: Presentacion de Estabilizacion
        responsible: project-manager
        approver: product-owner
        mandatory: true
        artifact_type: presentation

  - id: closure
    name: Cierre
    gate_approver: product-owner
    deliverables:
      - id: closure-report
        name: Informe de Cierre del Proyecto
        responsible: project-manager
        approver: product-owner
        mandatory: true
        artifact_type: report
      - id: lessons-learned
        name: Lecciones Aprendidas
        responsible: project-manager
        approver: product-owner
        mandatory: true
        artifact_type: document
      - id: closure-presentation
        name: Presentacion de Cierre
        responsible: project-manager
        approver: product-owner
        mandatory: true
        artifact_type: presentation
      - id: final-documentation
        name: Documentacion Final del Proyecto
        responsible: tech-writer
        approver: project-manager
        mandatory: true
        artifact_type: document
        responsible_fallback: [project-manager]
