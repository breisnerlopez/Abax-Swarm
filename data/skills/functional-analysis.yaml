id: functional-analysis
name: Analisis Funcional
description: >
  Levantamiento y documentacion de requerimientos funcionales a partir
  de necesidades de negocio, incluyendo reglas, excepciones y alcance.
used_by:
  - business-analyst
content:
  when_to_use: |
    - Cuando se inicia una nueva funcionalidad o modulo.
    - Cuando el usuario reporta una necesidad no documentada.
    - Cuando se requiere clarificar alcance ante ambiguedad.
    - Cuando se detectan reglas de negocio no formalizadas.
  instructions: |
    ## Proceso de Analisis Funcional
    1. Identificar stakeholders y fuentes de informacion.
    2. Documentar proceso actual (AS IS) si existe.
    3. Levantar reglas de negocio en formato tabla:
       | ID | Regla | Condicion | Accion | Excepciones |
    4. Definir alcance con limites claros (que SI, que NO).
    5. Escribir criterios de aceptacion en Given/When/Then.
    6. Identificar dependencias con otros modulos/sistemas.
    7. Validar con Product Owner antes de aprobar.
  guides:
    - name: best-practices
      content: |
        - Nunca asumir, siempre preguntar y documentar.
        - Un requerimiento = una necesidad verificable.
        - Separar requerimientos funcionales de no funcionales.
        - Documentar explicitamente lo que NO esta en alcance.
        - Usar lenguaje del negocio, no tecnico.
