id: contract-first-design
name: Diseno Contract-First de APIs
description: >
  Diseno de APIs siguiendo el enfoque contract-first, donde la
  especificacion del contrato (OpenAPI, AsyncAPI, GraphQL Schema)
  se define antes de la implementacion, asegurando consistencia
  y alineacion entre consumidores y proveedores.
used_by:
  - integration-architect
content:
  when_to_use: |
    - Al disenar una nueva API que sera consumida por multiples clientes.
    - Al establecer acuerdos de interfaz entre equipos (frontend/backend, entre microservicios).
    - Al definir estandares organizacionales para el diseno de APIs.
    - Al implementar un API Gateway o portal de desarrolladores.
    - Al versionar APIs existentes o planificar cambios con compatibilidad hacia atras.
  instructions: |
    ## Que es Contract-First

    El enfoque contract-first consiste en disenar y acordar la especificacion
    de la API antes de escribir una sola linea de codigo de implementacion.
    El contrato se convierte en la fuente de verdad compartida entre
    consumidores y proveedores.

    ## Beneficios

    1. **Desarrollo paralelo**: Frontend y backend pueden trabajar simultaneamente
       usando mocks generados a partir del contrato.
    2. **Consistencia**: Un unico documento define la interfaz, evitando
       desalineaciones entre equipos.
    3. **Generacion de codigo**: A partir del contrato se generan clientes,
       servidores, DTOs, validadores y documentacion.
    4. **Gobernanza**: Facilita la revision y aprobacion de cambios en APIs
       mediante pull requests sobre el archivo de especificacion.
    5. **Testing**: Permite contract testing automatizado (Pact, Dredd, Schemathesis).

    ## Proceso de diseno

    ### 1. Identificar los casos de uso
    - Listar las operaciones que la API debe soportar.
    - Definir los actores (quien consume la API y para que).
    - Priorizar operaciones por valor de negocio.

    ### 2. Disenar los recursos y operaciones
    - Identificar los sustantivos del dominio (recursos).
    - Mapear operaciones CRUD y acciones especificas.
    - Definir las relaciones entre recursos.
    - Establecer convenciones de nombrado (camelCase, snake_case).

    ### 3. Escribir la especificacion
    - Usar OpenAPI 3.x para APIs REST.
    - Usar AsyncAPI 2.x/3.x para APIs event-driven.
    - Usar GraphQL SDL para APIs GraphQL.
    - Incluir: endpoints, metodos, parametros, schemas de request/response,
      codigos de error, ejemplos y descripciones.

    ### 4. Revisar y validar
    - Revision por pares (PR del archivo de especificacion).
    - Validar con linters (Spectral para OpenAPI).
    - Verificar con consumidores que el contrato cubre sus necesidades.
    - Ejecutar validacion automatizada en CI/CD.

    ### 5. Generar e implementar
    - Generar servidor stub y cliente SDK con herramientas de codegen.
    - Implementar la logica de negocio sobre el servidor generado.
    - Ejecutar contract tests para verificar que la implementacion
      cumple la especificacion.

    ## Convenciones de diseno REST

    - Usar sustantivos en plural para recursos: /users, /orders.
    - Usar HTTP verbs correctamente: GET (leer), POST (crear),
      PUT (reemplazar), PATCH (actualizar parcial), DELETE (eliminar).
    - Responder con codigos HTTP semanticos (201 Created, 204 No Content, etc.).
    - Implementar paginacion estandar: page/size o cursor-based.
    - Incluir HATEOAS cuando aporte valor (links de navegacion).
    - Versionar en la URL (/v1/) o en headers (Accept-Version).
  guides:
    - name: openapi-buenas-practicas
      content: |
        ## Estructura de un documento OpenAPI

        ```yaml
        openapi: 3.0.3
        info:
          title: API de Gestion de Pedidos
          version: 1.0.0
          description: API para crear, consultar y gestionar pedidos.
        servers:
          - url: https://api.ejemplo.com/v1
        paths:
          /orders:
            get:
              summary: Listar pedidos
              operationId: listOrders
              parameters:
                - name: page
                  in: query
                  schema:
                    type: integer
                    default: 1
              responses:
                '200':
                  description: Lista paginada de pedidos
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/OrderList'
        components:
          schemas:
            OrderList:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/Order'
                total:
                  type: integer
        ```

        ## Reglas clave

        - Siempre definir operationId unico para cada operacion.
        - Usar $ref para reutilizar schemas y evitar duplicacion.
        - Incluir ejemplos (example/examples) en schemas y responses.
        - Documentar todos los codigos de error posibles.
        - Usar tags para agrupar operaciones por dominio.
        - Definir securitySchemes y aplicarlos globalmente o por operacion.
    - name: versionado-y-compatibilidad
      content: |
        ## Estrategias de versionado

        ### Versionado en URL
        - `/v1/users`, `/v2/users`
        - Simple de implementar y entender.
        - Permite mantener multiples versiones simultaneamente.

        ### Versionado en headers
        - `Accept: application/vnd.api.v2+json`
        - URLs mas limpias pero menos visible.
        - Mas complejo de implementar y probar.

        ### Versionado por fecha
        - `API-Version: 2025-01-15`
        - Usado por Stripe y otros. Granularidad fina.
        - Requiere infraestructura de compatibilidad sofisticada.

        ## Cambios compatibles (no rompen el contrato)

        - Agregar nuevos endpoints.
        - Agregar campos opcionales a responses.
        - Agregar parametros opcionales a requests.
        - Agregar nuevos valores a enums en responses.
        - Relajar validaciones (hacer obligatorio un campo que era opcional).

        ## Cambios incompatibles (rompen el contrato)

        - Eliminar o renombrar endpoints existentes.
        - Eliminar o renombrar campos en responses.
        - Agregar campos obligatorios a requests.
        - Cambiar tipos de datos de campos existentes.
        - Restringir validaciones (hacer opcional un campo que era obligatorio).
        - Cambiar codigos de respuesta HTTP.

        ## Estrategia de deprecacion

        1. Marcar el endpoint como deprecated en la especificacion.
        2. Agregar header `Sunset: <fecha>` y `Deprecation: true` en responses.
        3. Notificar a los consumidores con al menos 3-6 meses de anticipacion.
        4. Monitorear el uso del endpoint deprecated.
        5. Remover solo cuando el trafico sea cero o negligible.
