id: prioritization
name: Priorizacion de Requerimientos y Backlog
description: >
  Tecnicas y criterios para priorizar requerimientos,
  historias de usuario y elementos del backlog del producto
  en funcion del valor de negocio y esfuerzo.
used_by:
  - product-owner
content:
  when_to_use: |
    - Al refinar el backlog del producto.
    - Al planificar un nuevo sprint o iteracion.
    - Al recibir nuevos requerimientos o solicitudes de cambio.
    - Al resolver conflictos de prioridad entre stakeholders.
  instructions: |
    ## Criterios de Priorizacion
    | Criterio | Descripcion |
    |---|---|
    | Valor de negocio | Impacto directo en objetivos estrategicos |
    | Urgencia | Restricciones temporales o dependencias criticas |
    | Esfuerzo | Complejidad tecnica y recursos necesarios |
    | Riesgo | Probabilidad e impacto de no implementar |
    | Dependencias | Elementos que bloquean o son bloqueados |

    ## Tecnicas de Priorizacion
    1. MoSCoW: clasificar en Must, Should, Could, Won't.
    2. Valor vs Esfuerzo: matriz de dos dimensiones para comparar.
    3. WSJF (Weighted Shortest Job First): priorizar por costo del retraso dividido por duracion.
    4. Kano: clasificar en basicas, de rendimiento y de entusiasmo.
    5. Stack ranking: ordenar de forma absoluta sin empates.
  guides:
    - name: backlog-refinement
      content: |
        - Revisar cada elemento del backlog con criterios de aceptacion claros.
        - Asignar valor de negocio en escala numerica (1-10).
        - Estimar esfuerzo con la tecnica de puntos de historia.
        - Identificar dependencias entre elementos.
        - Reordenar el backlog segun el resultado de la priorizacion.
    - name: stakeholder-alignment
      content: |
        - Presentar la priorizacion propuesta a los stakeholders clave.
        - Documentar los criterios utilizados para cada decision.
        - Resolver conflictos con datos objetivos y metricas.
        - Registrar acuerdos y compromisos en actas de reunion.
