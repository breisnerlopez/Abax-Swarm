id: run-tests
name: Ejecutor de Tests
description: Ejecuta la suite de tests del proyecto y retorna resultados con estado, cobertura y fallos detectados.
used_by:
  - tech-lead
  - developer-backend
  - developer-frontend
  - qa-functional
  - qa-automation
  - devops
implementation:
  language: typescript
  args:
    test_type:
      type: string
      description: "Tipo de test: unit, integration, e2e, all"
      default: unit
    path:
      type: string
      description: Ruta especifica a ejecutar (opcional, vacio para todos)
      default: ""
      required: false
  returns: string
  body: |
    // Runtime defaults — el plugin OpenCode no aplica .default() del schema
    // cuando el LLM omite el arg (incidente create-presentation 0.1.32).
    const testType = args.test_type || "unit";
    const path = args.path || "";
    const cmd = path ? "npm test -- " + path : "npm test";
    return "Ejecutando: " + cmd + " (tipo: " + testType + ")";
